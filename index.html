<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Enderfall Network | Minecraft Server Status</title>
    <meta name="description" content="Enderfall Minecraft Server - Check online players and start the server">
    <meta name="author" content="Enderfall Network">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Enderfall Network Minecraft Server">
    <meta property="og:description" content="Modern Minecraft server with purple theme">
    <meta property="og:type" content="website">
    
    <!-- Favicon (optional - create your own) -->
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0b2e 50%, #0f0a1f 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .server-card {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 10, 40, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            transition: transform 0.3s ease;
            z-index: 1;
        }

        .server-card:hover {
            transform: translateY(-5px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(139, 92, 246, 0.3);
        }

        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .logo p {
            color: #a78bfa;
            font-size: 0.85rem;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(139, 92, 246, 0.5);
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .led.online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .led.offline {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .players-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .online-count {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .count-number {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
            min-height: 80px;
        }

        .player-tag {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(168, 85, 247, 0.1));
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .player-tag:hover {
            transform: translateY(-2px);
            background: rgba(139, 92, 246, 0.3);
        }

        .member-btn {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 1.5rem 0;
            position: relative;
            overflow: hidden;
        }

        .member-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .member-btn:hover::before {
            left: 100%;
        }

        .member-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .member-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            border-left: 4px solid #a855f7;
            font-size: 0.9rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .config-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #a78bfa;
            text-align: center;
        }

        @media (max-width: 600px) {
            .server-card {
                padding: 1rem;
            }
            .count-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="server-card">
        <div class="header">
            <div class="logo">
                <h1><i class="fas fa-crown"></i> Enderfall Network</h1>
                <p>Premium Minecraft Experience</p>
            </div>
            <div class="status-badge">
                <div class="led" id="ledIndicator"></div>
                <span id="serverStatusText">Checking...</span>
            </div>
        </div>

        <div class="players-section">
            <div class="online-count">
                <div>
                    <span class="count-number" id="playerCount">0</span>
                    <span style="color: #a78bfa;"> players online</span>
                </div>
                <div style="font-size: 0.8rem; color: #7e6b9e;">
                    <i class="fas fa-sync-alt"></i> Auto-refresh (15s)
                </div>
            </div>
            <div id="playerList" class="player-list">
                <div style="color: #7e6b9e;"><i class="fas fa-spinner fa-pulse"></i> Loading players...</div>
            </div>
        </div>

        <button class="member-btn" id="memberStartBtn">
            <i class="fas fa-gem"></i>
            MEMBERS ONLY: Start Server
            <i class="fas fa-microchip"></i>
        </button>

        <div class="alert-panel" id="alertPanel">
            <i class="fas fa-info-circle"></i>
            <span id="alertMessage">Connected to Oracle Cloud backend. Member verification required.</span>
        </div>

        <div class="config-section">
            <i class="fas fa-cloud-upload-alt"></i> Powered by Oracle Cloud • 24/7 Server Manager
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - YOUR ORACLE VM DETAILS
        // ============================================
        const ORACLE_VM_IP = '150.136.72.150';
        const API_SECRET = 'sk_live_Z1dguPd8TGeRkr3DfWDbiIPT769zeYn3';
        const API_BASE = `http://${ORACLE_VM_IP}:5000`;
        
        let refreshInterval;
        let isMemberAuthenticated = false;
        
        // Fetch server status
        async function fetchServerStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                if (!response.ok) {
                    throw new Error('Manager not responding');
                }
                
                const data = await response.json();
                console.log('Status response:', data);
                
                // For demo, show server as online if manager is responding
                updateUI({
                    serverOnline: true,
                    players: {
                        online: Math.floor(Math.random() * 8),
                        list: ['AetherCrafter', 'PixelWarden', 'LunaVoid', 'ElytraBlaze'].slice(0, Math.floor(Math.random() * 4) + 1)
                    }
                });
                
            } catch (error) {
                console.error('Failed to fetch server status:', error);
                document.getElementById('playerList').innerHTML = 
                    '<div style="color: #ef4444;"><i class="fas fa-exclamation-triangle"></i> Cannot connect to Oracle Cloud manager</div>';
                document.getElementById('alertMessage').innerHTML = '⚠️ Backend connection issue. Is the Oracle VM running?<br><small>Make sure port 5000 is open in Oracle Cloud Console</small>';
            }
        }
        
        // Update UI with server data
        function updateUI(data) {
            const playerCount = data.players?.online || 0;
            const playerList = data.players?.list || [];
            const serverOnline = data.serverOnline;
            
            document.getElementById('playerCount').textContent = playerCount;
            
            const playerListDiv = document.getElementById('playerList');
            if (playerList.length > 0) {
                playerListDiv.innerHTML = playerList.map(name => `
                    <div class="player-tag">
                        <i class="fas fa-user"></i>
                        ${escapeHtml(name)}
                    </div>
                `).join('');
            } else if (serverOnline) {
                playerListDiv.innerHTML = '<div style="color: #7e6b9e;"><i class="fas fa-bed"></i> No players online — Server is waiting!</div>';
            } else {
                playerListDiv.innerHTML = '<div style="color: #f59e0b;"><i class="fas fa-power-off"></i> Server is offline. Click the button above to start!</div>';
            }
            
            const led = document.getElementById('ledIndicator');
            const statusText = document.getElementById('serverStatusText');
            
            if (serverOnline) {
                led.className = 'led online';
                statusText.innerHTML = '<i class="fas fa-check-circle"></i> Server Online';
            } else {
                led.className = 'led offline';
                statusText.innerHTML = '<i class="fas fa-power-off"></i> Server Offline';
            }
        }
        
        // Member authentication
        async function authenticateMember() {
            if (isMemberAuthenticated) return true;
            
            const memberKey = prompt('🔐 MEMBERS ONLY\n\nEnter your special membership key to start the server:', '');
            
            const validKeys = ['enderfall2026', 'purplecrown', 'member123', 'admin', 'enderfall'];
            
            if (validKeys.includes(memberKey?.toLowerCase())) {
                isMemberAuthenticated = true;
                localStorage.setItem('member_authenticated', 'true');
                showAlert('✅ Member verified! You can now start the server.', 'success');
                return true;
            } else if (memberKey !== null && memberKey !== '') {
                showAlert('❌ Invalid membership key. Access denied.', 'error');
                return false;
            }
            return false;
        }
        
        // Trigger server start
        async function triggerServerStart() {
            const startBtn = document.getElementById('memberStartBtn');
            const originalText = startBtn.innerHTML;
            
            startBtn.disabled = true;
            startBtn.innerHTML = '<div class="loading"></div> Contacting Oracle Cloud manager...';
            
            try {
                const response = await fetch(`${API_BASE}/start-server`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        secret: API_SECRET
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status) {
                    showAlert('✅ Server start command sent to Oracle Cloud! The server will boot up shortly (1-2 minutes).', 'success');
                } else {
                    showAlert('❌ Failed to start server: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                console.error('Start server error:', error);
                showAlert('❌ Cannot reach Oracle Cloud manager. Make sure the Oracle VM is running and port 5000 is open in firewall.', 'error');
            } finally {
                setTimeout(() => {
                    startBtn.disabled = false;
                    startBtn.innerHTML = originalText;
                }, 4000);
            }
        }
        
        function showAlert(message, type = 'info') {
            const alertPanel = document.getElementById('alertPanel');
            const alertMessage = document.getElementById('alertMessage');
            alertMessage.innerHTML = message;
            
            const colors = {
                'success': '#10b981',
                'error': '#ef4444',
                'warning': '#f59e0b',
                'info': '#a855f7'
            };
            
            alertPanel.style.borderLeftColor = colors[type] || '#a855f7';
            
            setTimeout(() => {
                if (alertMessage.innerHTML === message) {
                    alertPanel.style.borderLeftColor = '#a855f7';
                }
            }, 8000);
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById('memberStartBtn').addEventListener('click', async () => {
            const authenticated = await authenticateMember();
            if (authenticated) {
                await triggerServerStart();
            }
        });
        
        if (localStorage.getItem('member_authenticated') === 'true') {
            isMemberAuthenticated = true;
            showAlert('Welcome back, Member! Click the button to start the server.', 'success');
        }
        
        // Start auto-refresh
        fetchServerStatus();
        refreshInterval = setInterval(fetchServerStatus, 15000);
        
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
