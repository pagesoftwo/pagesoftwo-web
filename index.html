<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Control · Secure Proxy Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0b2e 0%, #0f0719 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .dashboard {
      max-width: 700px;
      width: 100%;
      background: rgba(46, 21, 82, 0.55);
      backdrop-filter: blur(14px);
      border-radius: 3rem;
      border: 1px solid rgba(175, 112, 245, 0.4);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      padding: 2rem 1.8rem;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #e0b0ff, #b77eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    h1::before {
      content: "⚡";
      font-size: 2rem;
      color: #c77dff;
    }

    .sub {
      color: #ba9bdd;
      margin-bottom: 2rem;
      border-left: 3px solid #b77eff;
      padding-left: 0.9rem;
      font-size: 0.9rem;
    }

    .status-card {
      background: #221a33cc;
      border-radius: 2rem;
      padding: 1rem 1.4rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid #9d65e0;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .led {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: gray;
      transition: all 0.2s;
    }
    .led.online { background: #b0ff90; box-shadow: 0 0 8px #a0f080; }
    .led.offline { background: #ff8888; box-shadow: 0 0 6px #ff6666; }
    .led.limbo { background: #ffb347; box-shadow: 0 0 8px #ffae42; }

    .status-text { font-weight: 600; color: #f1e6ff; }

    .refresh-btn {
      background: #2f2046;
      border: none;
      color: #cba6ff;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0 1.8rem;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      background: #2a1b42;
      border: none;
      padding: 0.9rem 0.5rem;
      border-radius: 2.2rem;
      font-weight: 600;
      color: #eddaff;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .btn-primary { background: linear-gradient(105deg, #8849e0, #b05eff); color: white; }
    .btn-primary:hover { transform: translateY(-2px); background: linear-gradient(105deg, #9a5bef, #c777ff); }
    .btn-outline { border: 1.5px solid #ac73ff; background: rgba(95, 43, 162, 0.3); }
    .btn-outline:hover { background: #6b43a1cc; }
    .btn-special { background: linear-gradient(105deg, #9b30ff, #c76eff); }
    .btn-special:hover { transform: translateY(-2px); box-shadow: 0 0 12px #cc88ff; }

    .player-list {
      background: #171127b3;
      border-radius: 1.8rem;
      padding: 1.2rem 1.4rem;
      margin-top: 1rem;
    }

    .player-title {
      font-weight: 600;
      margin-bottom: 0.7rem;
      color: #cfaaff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-badge {
      background: #421e7a;
      border-radius: 2rem;
      padding: 0.25rem 0.7rem;
      font-size: 0.8rem;
    }

    .player-names { display: flex; flex-wrap: wrap; gap: 0.7rem; }
    .player-tag {
      background: #2d1f46;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      color: #eacdff;
      border-left: 3px solid #b77aff;
    }

    .geyser-card {
      margin-top: 1rem;
      background: #2a1d44aa;
      border-radius: 1.5rem;
      padding: 0.7rem;
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      color: #e5ccff;
      border: 1px dashed #b77eff;
      display: none;
    }

    .error-message {
      background: #4e1f2f80;
      border-radius: 2rem;
      padding: 0.8rem;
      margin-top: 1rem;
      text-align: center;
      color: #ffbbaa;
    }

    .info-note {
      font-size: 0.75rem;
      color: #ab88df;
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid #562d9e40;
      padding-top: 1rem;
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; }
    @media (max-width: 600px) { .btn { font-size: 0.75rem; } }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>Purple Cortex <span style="font-size:1rem;">🔒 Proxy Mode</span></h1>
  <div class="sub">Secure · No API keys exposed</div>

  <div class="status-card">
    <div class="status-badge">
      <div class="led offline" id="statusLed"></div>
      <span class="status-text" id="statusText">—</span>
    </div>
    <button class="refresh-btn" id="refreshStatusBtn">⟳ Refresh</button>
  </div>

  <div class="button-grid">
    <button class="btn btn-primary" id="startServerBtn">▶ Start</button>
    <button class="btn btn-outline" id="wakeLimboBtn">🌀 Wake from Limbo</button>
    <button class="btn btn-special" id="fixBedrockBtn">⚙️ Fix Bedrock</button>
  </div>

  <div class="player-list">
    <div class="player-title">
      <span>👥 Online players</span>
      <span class="player-badge" id="playerCountBadge">0</span>
    </div>
    <div id="playerListContainer" class="player-names">
      <span style="color:#aa94dd;">— click refresh —</span>
    </div>
  </div>

  <div id="geyserInfo" class="geyser-card">
    ✨ Geyser ready → <span id="geyserAddress"></span>
  </div>
  <div id="messageArea"></div>
  <div class="info-note">
    🔐 Your API key and server ID are stored only on Deno Deploy. All requests go through a secure proxy.
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  // Replace this with your Deno Deploy proxy URL (e.g., https://your-project.deno.dev)
  const PROXY_BASE = "https://pagesoftwo-web.pagesoftwo.deno.neti";
  // ===================================

  // Helper: call the proxy instead of direct Play.Hosting
  async function callProxy(endpoint, method = "GET", body = null) {
    const url = `${PROXY_BASE}${endpoint}`;
    const options = {
      method,
      headers: { "Content-Type": "application/json" },
    };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(url, options);
    if (!response.ok) {
      let errorMsg = await response.text();
      throw new Error(`Proxy error ${response.status}: ${errorMsg}`);
    }
    if (response.status === 204) return { success: true };
    return await response.json();
  }

  async function fetchServerStatus() {
    try {
      const data = await callProxy(`/servers/${SERVER_ID}`);
      return data.attributes?.current_state || data.attributes?.status || "unknown";
    } catch { return "error"; }
  }

  async function fetchServerWithAllocations() {
    return await callProxy(`/servers/${SERVER_ID}?include=allocations`);
  }

  async function startServer() {
    await callProxy(`/servers/${SERVER_ID}/power`, "POST", { signal: "start" });
    showMessage("✅ Start command sent", "success");
    setTimeout(refreshAll, 2000);
  }

  async function stopServer() {
    await callProxy(`/servers/${SERVER_ID}/power`, "POST", { signal: "stop" });
    showMessage("⏹️ Stop command sent", "info");
    let attempts = 0;
    while (attempts < 15) {
      const status = await fetchServerStatus();
      if (status === "offline") return true;
      await new Promise(r => setTimeout(r, 2000));
      attempts++;
    }
    throw new Error("Timeout stopping server");
  }

  async function wakeFromLimbo() {
    const status = await fetchServerStatus();
    if (status === "offline") {
      await startServer();
      return;
    }
    await callProxy(`/servers/${SERVER_ID}/command`, "POST", { command: "list" });
    showMessage("🌀 Wake command sent", "success");
    setTimeout(refreshAll, 3000);
  }

  async function fixBedrockAndRestart() {
    const btn = document.getElementById("fixBedrockBtn");
    btn.disabled = true;
    showMessage("🔧 Fix Bedrock: stopping server...", "info");
    try {
      let currentStatus = await fetchServerStatus();
      if (currentStatus !== "offline") {
        await stopServer();
        await new Promise(r => setTimeout(r, 3000));
      }
      const serverAttrs = await fetchServerWithAllocations();
      const allocations = serverAttrs.attributes?.relationships?.allocations?.data || [];
      let primaryAlloc = null;
      let secondaryIds = [];
      for (const alloc of allocations) {
        if (alloc.attributes.is_primary) primaryAlloc = alloc.attributes;
        else secondaryIds.push(alloc.attributes.id);
      }
      if (!primaryAlloc) throw new Error("No primary allocation");
      showMessage(`Deleting ${secondaryIds.length} extra port(s)...`, "info");
      for (const id of secondaryIds) {
        await callProxy(`/servers/${SERVER_ID}/network/allocations/${id}`, "DELETE");
      }
      await startServer();
      let running = false;
      for (let i = 0; i < 20; i++) {
        const st = await fetchServerStatus();
        if (st === "running") { running = true; break; }
        await new Promise(r => setTimeout(r, 2500));
      }
      if (!running) throw new Error("Server failed to start after port cleanup");
      const fresh = await fetchServerWithAllocations();
      const primary = fresh.attributes?.relationships?.allocations?.data.find(a => a.attributes.is_primary)?.attributes;
      const serverIp = primary?.ip_alias || primary?.ip;
      const bedrockPort = 19132;
      const geyserConnect = `${serverIp}:${bedrockPort}`;
      document.getElementById("geyserAddress").innerText = geyserConnect;
      document.getElementById("geyserInfo").style.display = "block";
      showMessage(`🧪 Bedrock ready: ${geyserConnect}`, "success");
      await refreshAll();
    } catch (err) {
      showMessage(`❌ Fix failed: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function fetchOnlinePlayers() {
    try {
      const data = await callProxy(`/servers/${SERVER_ID}/players`);
      let players = [];
      if (data?.data && Array.isArray(data.data)) players = data.data.map(p => p.attributes?.username);
      else if (data?.players && Array.isArray(data.players)) players = data.players.map(p => p.username);
      return players.filter(p => p);
    } catch { return null; }
  }

  function updateStatusUI(status) {
    const led = document.getElementById("statusLed");
    const statusText = document.getElementById("statusText");
    led.className = "led";
    let s = status?.toLowerCase() || "unknown";
    if (s === "running") { led.classList.add("online"); statusText.innerText = "🟢 ONLINE"; }
    else if (s === "offline") { led.classList.add("offline"); statusText.innerText = "🔴 OFFLINE"; }
    else if (s === "starting") { led.classList.add("limbo"); statusText.innerText = "🟡 STARTING"; }
    else if (s === "suspended" || s === "limbo") { led.classList.add("limbo"); statusText.innerText = "🌙 LIMBO"; }
    else { led.classList.add("offline"); statusText.innerText = `⚪ ${status}`; }
  }

  function displayPlayers(players) {
    const container = document.getElementById("playerListContainer");
    const badge = document.getElementById("playerCountBadge");
    if (players === null) {
      container.innerHTML = "<span>⚠️ Server offline / unreachable</span>";
      badge.innerText = "?";
      return;
    }
    badge.innerText = players.length;
    if (players.length === 0) container.innerHTML = "<span>✨ No players online</span>";
    else container.innerHTML = players.map(p => `<div class="player-tag">🧸 ${escapeHtml(p)}</div>`).join("");
  }

  function showMessage(msg, type = "info") {
    const area = document.getElementById("messageArea");
    const bg = type === "error" ? "#b8324f" : (type === "success" ? "#3b2b5f" : "#2b1d46");
    area.innerHTML = `<div class="error-message" style="background:${bg}cc">${type === "success" ? "✔️" : "💜"} ${msg}</div>`;
    setTimeout(() => { if (area.firstChild) area.removeChild(area.firstChild); }, 5000);
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  let refreshing = false;
  async function refreshAll() {
    if (refreshing) return;
    refreshing = true;
    const btn = document.getElementById("refreshStatusBtn");
    btn.disabled = true;
    btn.innerText = "⟳ ...";
    try {
      const status = await fetchServerStatus();
      updateStatusUI(status);
      if (status === "running") displayPlayers(await fetchOnlinePlayers());
      else displayPlayers(null);
    } catch (err) { showMessage(err.message, "error"); }
    finally { btn.disabled = false; btn.innerText = "⟳ Refresh"; refreshing = false; }
  }

  document.getElementById("startServerBtn").onclick = async () => { await startServer(); };
  document.getElementById("wakeLimboBtn").onclick = async () => { await wakeFromLimbo(); };
  document.getElementById("fixBedrockBtn").onclick = async () => { await fixBedrockAndRestart(); };
  document.getElementById("refreshStatusBtn").onclick = () => refreshAll();

  // We need SERVER_ID from proxy? Actually the proxy forwards it, but frontend still needs to know the server ID.
  // However, to avoid exposing it in HTML, we can ask the proxy to return the server ID from env.
  // But for simplicity, the frontend still needs to know which server to control.
  // Let's store it as a variable; but if you want absolutely zero exposure, you'd hardcode it in proxy.
  // I'll assume you're OK with the server ID being visible (it's not a secret, just an identifier).
  // If you want it hidden, modify proxy to hardcode server ID and omit it from frontend calls.
  // For now, we'll ask user to set it here; or you can remove this line and put the ID directly in proxy.
  // I'll add a constant.
  const SERVER_ID = "YOUR_SERVER_ID";  // Replace with your actual server ID (or leave as "PROXY_STORES_IT" and modify proxy)
  // Better: set SERVER_ID in proxy and don't require frontend to know it. Let's do that.
  // I'll adjust the HTML to not require SERVER_ID - assume proxy injects it.
  // Actually, the proxy.ts already injects the server ID from env into the URL? No, the proxy forwards whatever endpoint we send.
  // If we want the frontend to not know the server ID, we'd need to rewrite endpoints in proxy to always use the known ID.
  // Simpler: keep it visible. Server IDs are not sensitive (they are like usernames). The API key is the secret.
  alert("Edit the constant SERVER_ID inside the script tag to match your actual server ID.");
</script>
</body>
</html>
