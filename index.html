<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pagesoftwo :D Server Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #1a0b2e 0%, #0f0719 100%); font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
    .dashboard { max-width: 750px; width: 100%; background: rgba(46, 21, 82, 0.55); backdrop-filter: blur(14px); border-radius: 3rem; border: 1px solid rgba(175, 112, 245, 0.4); box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5); padding: 2rem 1.8rem; }
    h1 { font-size: 2rem; background: linear-gradient(135deg, #e0b0ff, #b77eff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.6rem; }
    h1::before { content: "⚡"; font-size: 2rem; color: #c77dff; }
    .sub { color: #ba9bdd; margin-bottom: 2rem; border-left: 3px solid #b77eff; padding-left: 0.9rem; font-size: 0.9rem; }
    .status-card { background: #221a33cc; border-radius: 2rem; padding: 1rem 1.4rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; border: 1px solid #9d65e0; }
    .status-badge { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }
    .led { width: 14px; height: 14px; border-radius: 50%; background: gray; transition: all 0.2s; }
    .led.online { background: #b0ff90; box-shadow: 0 0 8px #a0f080; }
    .led.offline { background: #ff8888; box-shadow: 0 0 6px #ff6666; }
    .led.limbo { background: #ffb347; box-shadow: 0 0 8px #ffae42; }
    .led.queued { background: #77aaff; box-shadow: 0 0 8px #77aaff; }
    .status-text { font-weight: 600; color: #f1e6ff; }
    .queue-position { font-size: 0.85rem; background: #2f2046; padding: 0.2rem 0.8rem; border-radius: 2rem; color: #cba6ff; }
    .refresh-btn { background: #2f2046; border: none; color: #cba6ff; padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; transition: 0.2s; }
    .refresh-btn:hover { background: #4a2f73; color: white; }
    .button-grid { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0 1.5rem; }
    .btn { flex: 1; min-width: 120px; background: #2a1b42; border: none; padding: 0.9rem 0.5rem; border-radius: 2.2rem; font-weight: 600; color: #eddaff; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
    .btn-primary { background: linear-gradient(105deg, #8849e0, #b05eff); color: white; }
    .btn-primary:hover { transform: translateY(-2px); background: linear-gradient(105deg, #9a5bef, #c777ff); box-shadow: 0 10px 20px -6px #995eff80; }
    .btn-outline { border: 1.5px solid #ac73ff; background: rgba(95, 43, 162, 0.3); }
    .btn-outline:hover { background: #6b43a1cc; border-color: #c38eff; }
    .btn-special { background: linear-gradient(105deg, #9b30ff, #c76eff); color: white; }
    .btn-special:hover { transform: translateY(-2px); box-shadow: 0 0 12px #cc88ff; }
    .btn-queue { background: linear-gradient(105deg, #3a86ff, #00b4d8); color: white; }
    .btn-queue:hover { transform: translateY(-2px); box-shadow: 0 0 12px #3a86ff; }
    .player-list, .network-list { background: #171127b3; border-radius: 1.8rem; padding: 1rem 1.4rem; margin-top: 1rem; }
    .player-title, .network-title { font-weight: 600; margin-bottom: 0.7rem; color: #cfaaff; display: flex; align-items: center; gap: 8px; }
    .player-badge, .network-badge { background: #421e7a; border-radius: 2rem; padding: 0.25rem 0.7rem; font-size: 0.8rem; }
    .player-names, .network-list-container { display: flex; flex-wrap: wrap; gap: 0.7rem; }
    .player-tag, .network-tag { background: #2d1f46; padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.9rem; font-weight: 500; color: #eacdff; border-left: 3px solid #b77aff; }
    .network-tag-primary { border-left-color: gold; background: #3a2a5e; }
    .geyser-card { margin-top: 1rem; background: #2a1d44aa; border-radius: 1.5rem; padding: 0.7rem; text-align: center; font-family: monospace; font-weight: bold; color: #e5ccff; border: 1px dashed #b77eff; display: none; }
    .error-message { background: #4e1f2f80; border-radius: 2rem; padding: 0.8rem; margin-top: 1rem; text-align: center; color: #ffbbaa; backdrop-filter: blur(2px); }
    .info-note { font-size: 0.75rem; color: #ab88df; text-align: center; margin-top: 1.5rem; border-top: 1px solid #562d9e40; padding-top: 1rem; }
    button:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
    @media (max-width: 650px) { body { padding: 1rem; } .dashboard { padding: 1.5rem; } .btn { font-size: 0.75rem; min-width: 90px; padding: 0.7rem 0.3rem; } .button-grid { gap: 0.6rem; } .network-list-container { flex-direction: column; } .network-tag { word-break: break-all; } }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>Pagesoftwo <span style="font-size:1rem;">🔒 Secure</span></h1>
  <div class="sub">Meow</div>

  <div class="status-card">
    <div class="status-badge">
      <div class="led offline" id="statusLed"></div>
      <span class="status-text" id="statusText">—</span>
      <span id="queuePositionSpan" class="queue-position" style="display: none;"></span>
    </div>
    <button class="refresh-btn" id="refreshStatusBtn">⟳ Refresh</button>
  </div>

  <div class="button-grid">
    <button class="btn btn-primary" id="startServerBtn">▶ Start</button>
    <button class="btn btn-queue" id="joinQueueBtn">🚪 Join Queue (Wake)</button>
    <button class="btn btn-special" id="fixBedrockBtn">⚙️ Fix Bedrock</button>
  </div>

  <div class="player-list">
    <div class="player-title">
      <span>👥 Online players</span>
      <span class="player-badge" id="playerCountBadge">0</span>
    </div>
    <div id="playerListContainer" class="player-names">
      <span style="color:#aa94dd;">— click refresh —</span>
    </div>
  </div>

  <div class="network-list" id="networkSection" style="display: none;">
    <div class="network-title">
      <span>🌐 Network Allocations (IP:Port)</span>
      <span class="network-badge" id="networkCountBadge">0</span>
    </div>
    <div id="networkListContainer" class="network-list-container">
      <span style="color:#aa94dd;">— loading —</span>
    </div>
  </div>

  <div id="geyserInfo" class="geyser-card">
    ✨ Geyser ready → <span id="geyserAddress"></span>
  </div>
  <div id="messageArea"></div>
  <div class="info-note">
    🔐 Secure proxy. Queue position updates automatically after joining.<br>
    🚪 "Join Queue" wakes a limbo server and shows your spot in line.
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const PROXY_BASE = "https://pagesoftwo-web.pagesoftwo.deno.net/api";
  const SERVER_ID = "648d680a-d340-4eab-8f12-344c30f06026";
  // ===================================

  let queuePollInterval = null;

  async function callProxy(endpoint, method = "GET", body = null) {
    const url = `${PROXY_BASE}${endpoint}`;
    const options = { method, headers: { "Content-Type": "application/json" } };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(url, options);
    if (!response.ok) {
      let errorText = await response.text();
      throw new Error(`Proxy error ${response.status}: ${errorText}`);
    }
    if (response.status === 204) return { success: true };
    return await response.json();
  }

  // Fetch full server data (status + queue)
  async function fetchFullServerData() {
    try {
      const data = await callProxy(`/servers/${SERVER_ID}`);
      console.log("Full API response:", data);
      const status = data?.attributes?.status || "unknown";
      const queue = data?.attributes?.queue; // could be null or a number/object
      let queuePosition = null;
      if (queue && typeof queue === 'object' && queue.position !== undefined) queuePosition = queue.position;
      else if (typeof queue === 'number') queuePosition = queue;
      return { status, queuePosition, fullData: data };
    } catch (err) {
      console.warn("Fetch error", err);
      return { status: "error", queuePosition: null, fullData: null };
    }
  }

  async function fetchServerStatus() {
    const { status } = await fetchFullServerData();
    return status;
  }

  async function fetchServerWithAllocations() {
    const data = await callProxy(`/servers/${SERVER_ID}?include=allocations`);
    return data.attributes;
  }

  async function startServer() {
    const btn = document.getElementById("startServerBtn");
    btn.disabled = true;
    try {
      await callProxy(`/servers/${SERVER_ID}/power`, "POST", { signal: "start" });
      showMessage("✅ Start command sent. Server is booting up.", "success");
      setTimeout(refreshAll, 3000);
    } catch (err) {
      showMessage(`❌ Failed to start: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function stopServer() {
    await callProxy(`/servers/${SERVER_ID}/power`, "POST", { signal: "stop" });
    showMessage("⏹️ Stop command sent.", "info");
    for (let i = 0; i < 20; i++) {
      const status = await fetchServerStatus();
      if (status === "offline") return true;
      await new Promise(r => setTimeout(r, 2000));
    }
    throw new Error("Timeout stopping server");
  }

  // Poll queue position and server status after joining queue
  async function pollQueueUntilOnline() {
    if (queuePollInterval) clearInterval(queuePollInterval);
    const queueSpan = document.getElementById("queuePositionSpan");
    const led = document.getElementById("statusLed");
    const statusText = document.getElementById("statusText");
    
    queuePollInterval = setInterval(async () => {
      try {
        const { status, queuePosition } = await fetchFullServerData();
        if (queuePosition !== null && queuePosition !== undefined && status === "limbo") {
          queueSpan.style.display = "inline-block";
          queueSpan.innerText = `📋 Queue: ${queuePosition}`;
          led.className = "led queued";
          statusText.innerText = `⏳ QUEUED · Position ${queuePosition}`;
        } else if (status !== "limbo" && status !== "error") {
          // Finished queue
          clearInterval(queuePollInterval);
          queueSpan.style.display = "none";
          refreshAll(); // full refresh
        } else {
          // No queue position but still limbo
          queueSpan.style.display = "none";
        }
      } catch (err) {
        console.warn("Queue poll error", err);
      }
    }, 3000);
  }

  async function joinQueue() {
    const btn = document.getElementById("joinQueueBtn");
    if (btn.disabled) return;
    btn.disabled = true;
    showMessage("🚪 Joining node assignment queue...", "info");
    try {
      await callProxy(`/servers/${SERVER_ID}/join-queue`, "POST");
      showMessage("✅ Joined queue. Waiting for node assignment...", "success");
      // Start polling for queue position
      pollQueueUntilOnline();
      // Also manually refresh once to get initial queue position
      setTimeout(() => refreshAll(), 2000);
    } catch (err) {
      console.error("Join queue error:", err);
      showMessage(`⚠️ Could not join queue: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function fixBedrockAndRestart() {
    const btn = document.getElementById("fixBedrockBtn");
    btn.disabled = true;
    showMessage("🔧 Fix Bedrock: stopping server...", "info");
    try {
      let currentStatus = await fetchServerStatus();
      if (currentStatus !== "offline") {
        await stopServer();
        await new Promise(r => setTimeout(r, 3000));
      }
      // Get allocations
      const attrs = await fetchServerWithAllocations();
      const allocations = attrs?.relationships?.allocations?.data || [];
      let primaryAlloc = null;
      let secondaryIds = [];
      for (const alloc of allocations) {
        if (alloc.attributes.is_default) {
          primaryAlloc = alloc.attributes;
        } else {
          secondaryIds.push(alloc.attributes.id);
        }
      }
      if (!primaryAlloc) throw new Error("No primary allocation found");
      if (secondaryIds.length > 0) {
        showMessage(`Deleting ${secondaryIds.length} extra port(s)...`, "info");
        for (const id of secondaryIds) {
          await callProxy(`/servers/${SERVER_ID}/network/allocations/${id}`, "DELETE");
        }
      } else {
        showMessage("No secondary allocations to delete.", "info");
      }
      // Start server
      await startServer();
      // Wait for server to become running
      let running = false;
      for (let i = 0; i < 30; i++) {
        const st = await fetchServerStatus();
        if (st === "running") { running = true; break; }
        await new Promise(r => setTimeout(r, 2500));
      }
      if (!running) throw new Error("Server failed to start after port cleanup");
      // Refresh everything to show updated network allocations
      await refreshAll();
      // Also extract Geyser info for extra clarity
      const freshData = (await fetchFullServerData()).fullData;
      if (freshData) {
        const allocationsData = freshData?.attributes?.relationships?.allocations?.data || [];
        const geyserAlloc = allocationsData.find(a => a.attributes.notes?.toLowerCase().includes("geyser"));
        if (geyserAlloc) {
          const ip = geyserAlloc.attributes.ip_alias || geyserAlloc.attributes.ip;
          const port = geyserAlloc.attributes.port;
          document.getElementById("geyserAddress").innerText = `${ip}:${port}`;
          document.getElementById("geyserInfo").style.display = "block";
          showMessage(`🧪 Bedrock connection: ${ip}:${port}`, "success");
        } else {
          document.getElementById("geyserInfo").style.display = "none";
        }
      }
    } catch (err) {
      showMessage(`❌ Fix failed: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
    }
  }

  async function fetchOnlinePlayers() {
    try {
      const data = await callProxy(`/servers/${SERVER_ID}/players`);
      let players = [];
      if (data?.data && Array.isArray(data.data)) {
        players = data.data.map(p => p.attributes?.username).filter(Boolean);
      } else if (Array.isArray(data)) {
        players = data;
      }
      return players;
    } catch (err) {
      console.warn("Players fetch error (server offline or limbo):", err);
      return null;
    }
  }

  function displayNetworkAllocations(fullData) {
    const networkSection = document.getElementById("networkSection");
    const container = document.getElementById("networkListContainer");
    const badge = document.getElementById("networkCountBadge");
    if (!fullData?.attributes?.relationships?.allocations?.data) {
      networkSection.style.display = "none";
      return;
    }
    networkSection.style.display = "block";
    const allocations = fullData.attributes.relationships.allocations.data;
    badge.innerText = allocations.length;
    if (allocations.length === 0) {
      container.innerHTML = "<span style='color:#b596e0;'>No allocations found</span>";
      return;
    }
    container.innerHTML = allocations.map(alloc => {
      const a = alloc.attributes;
      const ip = a.ip_alias || a.ip;
      const port = a.port;
      const isDefault = a.is_default;
      const note = a.notes ? ` (${a.notes})` : "";
      return `<div class="network-tag ${isDefault ? 'network-tag-primary' : ''}">🔌 ${ip}:${port}${note}${isDefault ? ' ⭐' : ''}</div>`;
    }).join("");
  }

  function updateStatusUI(status, queuePosition = null) {
    const led = document.getElementById("statusLed");
    const statusText = document.getElementById("statusText");
    const queueSpan = document.getElementById("queuePositionSpan");
    led.className = "led";
    const s = status?.toLowerCase() || "unknown";
    if (s === "running") { led.classList.add("online"); statusText.innerText = "🟢 ONLINE · Server active"; queueSpan.style.display = "none"; }
    else if (s === "offline") { led.classList.add("offline"); statusText.innerText = "🔴 OFFLINE · Server stopped"; queueSpan.style.display = "none"; }
    else if (s === "starting") { led.classList.add("limbo"); statusText.innerText = "🟡 STARTING · Please wait"; queueSpan.style.display = "none"; }
    else if (s === "stopping") { led.classList.add("limbo"); statusText.innerText = "🟠 STOPPING"; queueSpan.style.display = "none"; }
    else if (s === "limbo" || s === "suspended") {
      led.classList.add("limbo");
      if (queuePosition !== null && queuePosition !== undefined) {
        statusText.innerText = `⏳ QUEUED · Position ${queuePosition}`;
        queueSpan.style.display = "inline-block";
        queueSpan.innerText = `📋 Queue: ${queuePosition}`;
        led.classList.add("queued");
      } else {
        statusText.innerText = "🌙 LIMBO · Server asleep (use Join Queue)";
        queueSpan.style.display = "none";
      }
    }
    else if (s === "error") { led.classList.add("offline"); statusText.innerText = "⚠️ ERROR · Could not fetch status"; queueSpan.style.display = "none"; }
    else { led.classList.add("offline"); statusText.innerText = `⚪ ${status} (unknown)`; queueSpan.style.display = "none"; }
  }

  function displayPlayers(players) {
    const container = document.getElementById("playerListContainer");
    const badge = document.getElementById("playerCountBadge");
    if (players === null) {
      container.innerHTML = "<span style='color:#d9b0ff;'>⚠️ Server offline or in limbo – join queue to see players</span>";
      badge.innerText = "?";
      return;
    }
    badge.innerText = players.length;
    if (players.length === 0) {
      container.innerHTML = "<span style='color:#b596e0;'>✨ No players online</span>";
    } else {
      container.innerHTML = players.map(p => `<div class="player-tag">🧸 ${escapeHtml(p)}</div>`).join("");
    }
  }

  function showMessage(msg, type = "info") {
    const area = document.getElementById("messageArea");
    const bg = type === "error" ? "#b8324f" : (type === "success" ? "#3b2b5f" : "#2b1d46");
    area.innerHTML = `<div class="error-message" style="background:${bg}cc">${type === "success" ? "✔️" : "💜"} ${msg}</div>`;
    setTimeout(() => { if (area.firstChild) area.removeChild(area.firstChild); }, 5000);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  let refreshing = false;
  async function refreshAll() {
    if (refreshing) return;
    refreshing = true;
    const btn = document.getElementById("refreshStatusBtn");
    btn.disabled = true;
    btn.innerText = "⟳ ...";
    try {
      const { status, queuePosition, fullData } = await fetchFullServerData();
      updateStatusUI(status, queuePosition);
      if (fullData) {
        displayNetworkAllocations(fullData);
        // Update Geyser info
        const allocations = fullData?.attributes?.relationships?.allocations?.data || [];
        const geyserAlloc = allocations.find(a => a.attributes.notes?.toLowerCase().includes("geyser"));
        if (geyserAlloc) {
          const ip = geyserAlloc.attributes.ip_alias || geyserAlloc.attributes.ip;
          const port = geyserAlloc.attributes.port;
          document.getElementById("geyserAddress").innerText = `${ip}:${port}`;
          document.getElementById("geyserInfo").style.display = "block";
        } else {
          document.getElementById("geyserInfo").style.display = "none";
        }
      }
      if (status === "running") {
        const players = await fetchOnlinePlayers();
        displayPlayers(players);
      } else {
        displayPlayers(null);
      }
    } catch (err) {
      showMessage(`Refresh error: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.innerText = "⟳ Refresh";
      refreshing = false;
    }
  }

  // Clean up interval on page unload
  window.addEventListener("beforeunload", () => {
    if (queuePollInterval) clearInterval(queuePollInterval);
  });

  document.getElementById("startServerBtn").onclick = startServer;
  document.getElementById("joinQueueBtn").onclick = joinQueue;
  document.getElementById("fixBedrockBtn").onclick = fixBedrockAndRestart;
  document.getElementById("refreshStatusBtn").onclick = refreshAll;

  refreshAll();
  setInterval(refreshAll, 15000);
</script>
</body>
</html>
