<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagesoftwo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0b2e 0%, #0f0719 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .dashboard {
      max-width: 700px;
      width: 100%;
      background: rgba(46, 21, 82, 0.55);
      backdrop-filter: blur(14px);
      border-radius: 3rem;
      border: 1px solid rgba(175, 112, 245, 0.4);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      padding: 2rem 1.8rem;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #e0b0ff, #b77eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    h1::before {
      content: "⚡";
      font-size: 2rem;
      color: #c77dff;
    }

    .sub {
      color: #ba9bdd;
      margin-bottom: 2rem;
      border-left: 3px solid #b77eff;
      padding-left: 0.9rem;
      font-size: 0.9rem;
    }

    .status-card {
      background: #221a33cc;
      border-radius: 2rem;
      padding: 1rem 1.4rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid #9d65e0;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .led {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: gray;
      transition: all 0.2s;
    }
    .led.online { background: #b0ff90; box-shadow: 0 0 8px #a0f080; }
    .led.offline { background: #ff8888; box-shadow: 0 0 6px #ff6666; }
    .led.limbo { background: #ffb347; box-shadow: 0 0 8px #ffae42; }

    .status-text { font-weight: 600; color: #f1e6ff; }

    .refresh-btn {
      background: #2f2046;
      border: none;
      color: #cba6ff;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0 1.8rem;
    }

    .btn {
      flex: 1;
      min-width: 120px;
      background: #2a1b42;
      border: none;
      padding: 0.9rem 0.5rem;
      border-radius: 2.2rem;
      font-weight: 600;
      color: #eddaff;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .btn-primary { background: linear-gradient(105deg, #8849e0, #b05eff); color: white; }
    .btn-primary:hover { transform: translateY(-2px); background: linear-gradient(105deg, #9a5bef, #c777ff); }
    .btn-outline { border: 1.5px solid #ac73ff; background: rgba(95, 43, 162, 0.3); }
    .btn-outline:hover { background: #6b43a1cc; }
    .btn-special { background: linear-gradient(105deg, #9b30ff, #c76eff); }
    .btn-special:hover { transform: translateY(-2px); box-shadow: 0 0 12px #cc88ff; }

    .player-list {
      background: #171127b3;
      border-radius: 1.8rem;
      padding: 1.2rem 1.4rem;
      margin-top: 1rem;
    }

    .player-title {
      font-weight: 600;
      margin-bottom: 0.7rem;
      color: #cfaaff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-badge {
      background: #421e7a;
      border-radius: 2rem;
      padding: 0.25rem 0.7rem;
      font-size: 0.8rem;
    }

    .player-names { display: flex; flex-wrap: wrap; gap: 0.7rem; }
    .player-tag {
      background: #2d1f46;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      color: #eacdff;
      border-left: 3px solid #b77aff;
    }

    .geyser-card {
      margin-top: 1rem;
      background: #2a1d44aa;
      border-radius: 1.5rem;
      padding: 0.7rem;
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      color: #e5ccff;
      border: 1px dashed #b77eff;
      display: none;
    }

    .error-message {
      background: #4e1f2f80;
      border-radius: 2rem;
      padding: 0.8rem;
      margin-top: 1rem;
      text-align: center;
      color: #ffbbaa;
    }

    .info-note {
      font-size: 0.75rem;
      color: #ab88df;
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid #562d9e40;
      padding-top: 1rem;
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; }
    @media (max-width: 600px) { .btn { font-size: 0.75rem; } }
  </style>
</head>
<body>
<div class="dashboard">
  <h1>Pagesoftwo <span style="font-size:1rem;">🔒 Secure</span></h1>
  <div class="sub">Server Commands</div>

  <div class="status-card">
    <div class="status-badge">
      <div class="led offline" id="statusLed"></div>
      <span class="status-text" id="statusText">—</span>
    </div>
    <button class="refresh-btn" id="refreshStatusBtn">⟳ Refresh</button>
  </div>

  <div class="button-grid">
    <button class="btn btn-primary" id="startServerBtn">▶ Start</button>
    <button class="btn btn-outline" id="wakeLimboBtn">🌀 Wake from Limbo</button>
    <button class="btn btn-special" id="fixBedrockBtn">⚙️ Fix Bedrock</button>
  </div>

  <div class="player-list">
    <div class="player-title">
      <span>👥 Online players</span>
      <span class="player-badge" id="playerCountBadge">0</span>
    </div>
    <div id="playerListContainer" class="player-names">
      <span style="color:#aa94dd;">— click refresh —</span>
    </div>
  </div>

  <div id="geyserInfo" class="geyser-card">
    ✨ Geyser ready → <span id="geyserAddress"></span>
  </div>
  <div id="messageArea"></div>
  <div class="info-note">
    🔐 Your API key and server ID are stored on Deno Deploy. All requests go through a secure proxy.
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  // Replace with your Deno Deploy proxy URL (no trailing slash)
  const PROXY_BASE = "https://pagesoftwo-web.pagesoftwo.deno.net/api";
  // Your server UUID (the long one)
  const SERVER_ID = "648d680a-d340-4eab-8f12-344c30f06026";
  // ===================================

  // Helper to call the proxy
  async function callProxy(endpoint, method = "GET", body = null) {
    const url = `${PROXY_BASE}${endpoint}`;
    const options = {
      method,
      headers: { "Content-Type": "application/json" },
    };
    if (body) options.body = JSON.stringify(body);
    const response = await fetch(url, options);
    if (!response.ok) {
      let errorMsg = await response.text();
      throw new Error(`Proxy error ${response.status}: ${errorMsg}`);
    }
    if (response.status === 204) return { success: true };
    return await response.json();
  }

  // Get server status (from the /servers/{uuid} endpoint)
  async function fetchServerStatus() {
    try {
      const data = await callProxy(`/servers/${SERVER_ID}`);
      // The API returns an object with "attributes" -> "status"
      const status = data?.attributes?.status || "unknown";
      return status;
    } catch (err) {
      console.warn("Status fetch error", err);
      return "error";
    }
  }

  // Get server details including allocations (for Geyser fix)
  async function fetchServerWithAllocations() {
    const data = await callProxy(`/servers/${SERVER_ID}?include=allocations`);
    return data.attributes;
  }

  // Power actions
  async function startServer() {
    await callProxy(`/servers/${SERVER_ID}/power`, "POST", { signal: "start" });
    showMessage("✅ Start command sent", "success");
    setTimeout(refreshAll, 2000);
  }

  async function stopServer() {
    await callProxy(`/servers/${SERVER_ID}/power`, "POST", { signal: "stop" });
    showMessage("⏹️ Stop command sent", "info");
    // Wait for offline
    for (let i = 0; i < 15; i++) {
      const status = await fetchServerStatus();
      if (status === "offline") return true;
      await new Promise(r => setTimeout(r, 2000));
    }
    throw new Error("Timeout stopping server");
  }

  // Wake from limbo by sending a harmless command
  async function wakeFromLimbo() {
    const status = await fetchServerStatus();
    if (status === "offline") {
      await startServer();
      return;
    }
    await callProxy(`/servers/${SERVER_ID}/command`, "POST", { command: "list" });
    showMessage("🌀 Wake command sent – server should exit limbo soon", "success");
    setTimeout(refreshAll, 3000);
  }

  // Fix Bedrock: delete secondary allocations, keep only primary, restart
  async function fixBedrockAndRestart() {
    const btn = document.getElementById("fixBedrockBtn");
    btn.disabled = true;
    showMessage("🔧 Fix Bedrock: stopping server...", "info");
    try {
      let currentStatus = await fetchServerStatus();
      if (currentStatus !== "offline") {
        await stopServer();
        await new Promise(r => setTimeout(r, 3000));
      }
      const attrs = await fetchServerWithAllocations();
      const allocations = attrs?.relationships?.allocations?.data || [];
      let primaryAlloc = null;
      let secondaryIds = [];
      for (const alloc of allocations) {
        if (alloc.attributes.is_default) {
          primaryAlloc = alloc.attributes;
        } else {
          secondaryIds.push(alloc.attributes.id);
        }
      }
      if (!primaryAlloc) throw new Error("No primary allocation found");
      showMessage(`Deleting ${secondaryIds.length} extra port(s)...`, "info");
      for (const id of secondaryIds) {
        await callProxy(`/servers/${SERVER_ID}/network/allocations/${id}`, "DELETE");
      }
      await startServer();
      // Wait for server to become running
      let running = false;
      for (let i = 0; i < 20; i++) {
        const st = await fetchServerStatus();
        if (st === "running") { running = true; break; }
        await new Promise(r => setTimeout(r, 2500));
      }
      if (!running) throw new Error("Server failed to start after port cleanup");
      // Get fresh server details to show the IP/port for Geyser
      const freshAttrs = await fetchServerWithAllocations();
      const primary = freshAttrs?.relationships?.allocations?.data.find(a => a.attributes.is_default)?.attributes;
      const serverIp = primary?.ip_alias || primary?.ip;
      // Geyser usually uses port 19132, but sometimes the actual Bedrock port is the one with "Geyser" note
      // In your allocations, there is a port 5276 with notes "Geyser / Bedrock"
      let bedrockPort = 19132;
      const geyserAlloc = freshAttrs?.relationships?.allocations?.data.find(a => a.attributes.notes?.includes("Geyser"));
      if (geyserAlloc) bedrockPort = geyserAlloc.attributes.port;
      const geyserConnect = `${serverIp}:${bedrockPort}`;
      document.getElementById("geyserAddress").innerText = geyserConnect;
      document.getElementById("geyserInfo").style.display = "block";
      showMessage(`🧪 Bedrock ready: ${geyserConnect}`, "success");
      await refreshAll();
    } catch (err) {
      showMessage(`❌ Fix failed: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
    }
  }

  // Get online players (uses the /servers/{uuid}/players endpoint)
  async function fetchOnlinePlayers() {
    try {
      const data = await callProxy(`/servers/${SERVER_ID}/players`);
      // The endpoint returns something like { "data": [ { "attributes": { "username": "..." } } ] }
      let players = [];
      if (data?.data && Array.isArray(data.data)) {
        players = data.data.map(p => p.attributes?.username).filter(Boolean);
      } else if (Array.isArray(data)) {
        players = data;
      }
      return players;
    } catch (err) {
      console.warn("Players fetch error (server may be offline):", err);
      return null; // null means server offline/unreachable
    }
  }

  // UI updates
  function updateStatusUI(status) {
    const led = document.getElementById("statusLed");
    const statusText = document.getElementById("statusText");
    led.className = "led";
    const s = status?.toLowerCase() || "unknown";
    if (s === "running") { led.classList.add("online"); statusText.innerText = "🟢 ONLINE · Server active"; }
    else if (s === "offline") { led.classList.add("offline"); statusText.innerText = "🔴 OFFLINE · Server stopped"; }
    else if (s === "starting") { led.classList.add("limbo"); statusText.innerText = "🟡 STARTING · Please wait"; }
    else if (s === "stopping") { led.classList.add("limbo"); statusText.innerText = "🟠 STOPPING"; }
    else if (s === "limbo" || s === "suspended") { led.classList.add("limbo"); statusText.innerText = "🌙 LIMBO · Server asleep (use wake)"; }
    else { led.classList.add("offline"); statusText.innerText = `⚪ ${status || "unknown"}`; }
  }

  function displayPlayers(players) {
    const container = document.getElementById("playerListContainer");
    const badge = document.getElementById("playerCountBadge");
    if (players === null) {
      container.innerHTML = "<span style='color:#d9b0ff;'>⚠️ Server offline – start or wake to see players</span>";
      badge.innerText = "?";
      return;
    }
    badge.innerText = players.length;
    if (players.length === 0) {
      container.innerHTML = "<span style='color:#b596e0;'>✨ No players online</span>";
    } else {
      container.innerHTML = players.map(p => `<div class="player-tag">🧸 ${escapeHtml(p)}</div>`).join("");
    }
  }

  function showMessage(msg, type = "info") {
    const area = document.getElementById("messageArea");
    const bg = type === "error" ? "#b8324f" : (type === "success" ? "#3b2b5f" : "#2b1d46");
    area.innerHTML = `<div class="error-message" style="background:${bg}cc">${type === "success" ? "✔️" : "💜"} ${msg}</div>`;
    setTimeout(() => { if (area.firstChild) area.removeChild(area.firstChild); }, 5000);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  let refreshing = false;
  async function refreshAll() {
    if (refreshing) return;
    refreshing = true;
    const btn = document.getElementById("refreshStatusBtn");
    btn.disabled = true;
    btn.innerText = "⟳ ...";
    try {
      const status = await fetchServerStatus();
      updateStatusUI(status);
      if (status === "running") {
        const players = await fetchOnlinePlayers();
        displayPlayers(players);
      } else {
        displayPlayers(null);
      }
    } catch (err) {
      showMessage(`Refresh error: ${err.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.innerText = "⟳ Refresh";
      refreshing = false;
    }
  }

  // Set up event listeners
  document.getElementById("startServerBtn").onclick = async () => { await startServer(); };
  document.getElementById("wakeLimboBtn").onclick = async () => { await wakeFromLimbo(); };
  document.getElementById("fixBedrockBtn").onclick = async () => { await fixBedrockAndRestart(); };
  document.getElementById("refreshStatusBtn").onclick = () => refreshAll();

  // Initial load
  refreshAll();
  // Auto refresh every 15 seconds
  setInterval(refreshAll, 15000);
</script>
</body>
</html>
